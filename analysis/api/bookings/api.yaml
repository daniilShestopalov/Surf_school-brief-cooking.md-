paths:
  /bookings:
    get:
      operationId: getBookings
      summary: Получить список бронирований
      description: Возвращает активные бронирования пользователя. [Покрывает FR-30, UC-50].
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список бронирований.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './models.yaml#/components/schemas/Booking'
    post:
      operationId: createBooking
      summary: Создать бронирование
      description: Создает бронирование слота с опциональной арендой инвентаря. [Покрывает FR-37 и UC-25, FR-60, FR-65, FR-75].
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            $ref: '../common/models.yaml#/components/schemas/UUID'
          description: Ключ идемпотентности для предотвращения двойных списаний или бронирований.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './models.yaml#/components/schemas/CreateBookingRequest'
      responses:
        '201':
          description: Бронирование успешно создано.
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/Booking'
        '409':
          description: Конфликт при бронировании (места заняты или слот начался/инвентарь закончился).
          content:
            application/json:
              schema:
                $ref: '../common/models.yaml#/components/schemas/ErrorResponse'
        '410':
          description: Слот больше недоступен (invalid_code).
          content:
            application/json:
              schema:
                $ref: '../common/models.yaml#/components/schemas/ErrorResponse'
        '429':
          $ref: '../common/models.yaml#/components/responses/TooManyRequestsError'

  /bookings/{id}:
    get:
      operationId: getBooking
      summary: Получить детали конкретного бронирования
      description: Возвращает детали бронирования по его ID (необходимо для Push-уведомлений).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '../common/models.yaml#/components/schemas/UUID'
      responses:
        '200':
          description: Детали бронирования.
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/Booking'

  /bookings/{id}/cancel:
    post:
      operationId: cancelBooking
      summary: Отменить бронирование
      description: Отменяет активное бронирование клиента. [Покрывает FR-85].
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '../common/models.yaml#/components/schemas/UUID'
      responses:
        '200':
          description: Успешная отмена.
          
  /bookings/{id}/rating:
    post:
      operationId: rateChef
      summary: Оценить шефа
      description: Выставляет оценку шефу за проведенный класс. [Покрывает FR-100].
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '../common/models.yaml#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './models.yaml#/components/schemas/RateChefRequest'
      responses:
        '200':
          description: Оценка успешно сохранена.
